name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  detect-version:
    name: Detect package version change
    runs-on: ubuntu-latest

    outputs:
      changed: ${{ steps.version.outputs.changed }}
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - name: Check package version
        id: version
        shell: bash
        run: |
          set -euo pipefail

          version="$(node -p "require('./package.json').version")"
          tag="v${version}"
          previous_version=""

          if git cat-file -e HEAD^:package.json 2>/dev/null; then
            previous_version="$(git show HEAD^:package.json | node -e "let input = ''; process.stdin.on('data', chunk => input += chunk); process.stdin.on('end', () => console.log(JSON.parse(input).version || ''));")"
          fi

          if [[ "$version" != "$previous_version" ]]; then
            changed="true"
          else
            changed="false"
          fi

          {
            echo "changed=${changed}"
            echo "version=${version}"
            echo "tag=${tag}"
          } >> "$GITHUB_OUTPUT"

          echo "Current version: ${version}"
          echo "Previous version: ${previous_version:-<none>}"
          echo "Release needed: ${changed}"

  release:
    name: Publish v${{ needs.detect-version.outputs.version }}
    needs: detect-version
    if: needs.detect-version.outputs.changed == 'true'
    runs-on: ubuntu-latest

    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Run coverage
        run: npm run test:coverage

      - name: Build package
        run: npm run build

      - name: Audit production dependencies
        run: npm audit --omit=dev

      - name: Verify package contents
        run: npm pack --dry-run

      - name: Publish to npm
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.detect-version.outputs.tag }}
        run: |
          gh release create "$RELEASE_TAG" \
            --target "$GITHUB_SHA" \
            --title "$RELEASE_TAG" \
            --generate-notes
