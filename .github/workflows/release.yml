name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  detect-version:
    name: Detect npm version availability
    runs-on: blacksmith-4vcpu-ubuntu-2404

    outputs:
      changed: ${{ steps.version.outputs.changed }}
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Check npm registry version
        id: version
        shell: bash
        run: |
          set -euo pipefail

          package_name="$(node -p "require('./package.json').name")"
          version="$(node -p "require('./package.json').version")"
          tag="v${version}"
          published_version=""
          exact_version=""

          if published_version="$(npm view "${package_name}" version --json 2>/tmp/npm-view-latest.log | node -e "let input = ''; process.stdin.on('data', chunk => input += chunk); process.stdin.on('end', () => console.log(input ? JSON.parse(input) : ''));")"; then
            :
          elif grep -q "E404" /tmp/npm-view-latest.log; then
            published_version=""
          else
            cat /tmp/npm-view-latest.log >&2
            exit 1
          fi

          if exact_version="$(npm view "${package_name}@${version}" version --json 2>/tmp/npm-view-exact.log | node -e "let input = ''; process.stdin.on('data', chunk => input += chunk); process.stdin.on('end', () => console.log(input ? JSON.parse(input) : ''));")"; then
            changed="false"
          elif grep -q "E404" /tmp/npm-view-exact.log; then
            changed="true"
            exact_version=""
          else
            cat /tmp/npm-view-exact.log >&2
            exit 1
          fi

          {
            echo "changed=${changed}"
            echo "version=${version}"
            echo "tag=${tag}"
          } >> "$GITHUB_OUTPUT"

          echo "Package name: ${package_name}"
          echo "Current version: ${version}"
          echo "Published latest version: ${published_version:-<none>}"
          echo "Exact published version: ${exact_version:-<none>}"
          echo "Release needed: ${changed}"

  release:
    name: Publish v${{ needs.detect-version.outputs.version }}
    needs: detect-version
    if: needs.detect-version.outputs.changed == 'true'
    runs-on: ubuntu-latest

    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Run coverage
        run: npm run test:coverage

      - name: Build package
        run: npm run build

      - name: Audit production dependencies
        run: npm audit --omit=dev

      - name: Verify package contents
        run: npm pack --dry-run

      - name: Publish to npm
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.detect-version.outputs.tag }}
        run: |
          gh release create "$RELEASE_TAG" \
            --target "$GITHUB_SHA" \
            --title "$RELEASE_TAG" \
            --generate-notes
